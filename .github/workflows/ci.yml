name: CI

on:
  push:
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        path: z-runtime
    
    - name: Checkout z-core
      uses: actions/checkout@v3
      with:
        repository: ZeroicAI/z-core
        path: z-core
    
    - name: Checkout z-messaging
      uses: actions/checkout@v3
      with:
        repository: ZeroicAI/z-messaging
        path: z-messaging
    
    - name: Checkout z-cognition
      uses: actions/checkout@v3
      with:
        repository: ZeroicAI/z-cognition
        path: z-cognition
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: z-runtime
    
    - name: Check formatting
      working-directory: z-runtime
      run: cargo fmt --all -- --check
    
    - name: Build
      working-directory: z-runtime
      run: cargo build --verbose
    
    - name: Run Clippy
      working-directory: z-runtime
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Run tests
      working-directory: z-runtime
      run: cargo test --verbose
    
    - name: Run examples
      working-directory: z-runtime
      run: |
        cargo run --example basic_runtime
        cargo run --example scheduled_agents
        cargo run --example isolated_agents
        cargo run --example supervised_agents

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
      with:
        path: z-runtime
    - uses: actions/checkout@v3
      with:
        repository: ZeroicAI/z-core
        path: z-core
    - uses: actions/checkout@v3
      with:
        repository: ZeroicAI/z-messaging
        path: z-messaging
    - uses: actions/checkout@v3
      with:
        repository: ZeroicAI/z-cognition
        path: z-cognition
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: z-runtime
    - working-directory: z-runtime
      run: cargo test --verbose

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
      with:
        path: z-runtime
    - uses: actions/checkout@v3
      with:
        repository: ZeroicAI/z-core
        path: z-core
    - uses: actions/checkout@v3
      with:
        repository: ZeroicAI/z-messaging
        path: z-messaging
    - uses: actions/checkout@v3
      with:
        repository: ZeroicAI/z-cognition
        path: z-cognition
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: z-runtime
    - working-directory: z-runtime
      run: cargo test --verbose
